# ── ADIP Docker Compose ───────────────────────────────────────────────────────
#
# Profiles:
#   dev   — web + api + nginx against the hosted Supabase project (apps/*/.env)
#   prod  — web + api + nginx against the hosted Supabase project (.env.prod)
#
# Usage:
#   dev:   docker compose --profile dev up --build
#   prod:  docker compose --profile prod up --build
#
# NOTE: `npm run dev` on the host still works exactly as before — Docker is the
# deployment target, not a required dev environment.
# ─────────────────────────────────────────────────────────────────────────────

name: adip

services:

  # ── FastAPI — all agents in-process ────────────────────────────────────────
  api:
    profiles: [dev, prod]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"          # direct access kept for dev debugging
    volumes:
      - uploads-data:/app/.uploads   # persist call recordings in dev
    env_file:
      - path: ./apps/api/.env        # dev: local .env file (gitignored)
        required: false
      - path: ./.env.prod            # prod: production secrets (gitignored)
        required: false
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      EVENT_BUS_ENABLED: ${EVENT_BUS_ENABLED:-1}
      EVENT_MAX_RETRIES: ${EVENT_MAX_RETRIES:-3}
      EVENT_RETRY_BACKOFF_MS: ${EVENT_RETRY_BACKOFF_MS:-500}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  # ── TanStack Start web app ──────────────────────────────────────────────────
  web:
    profiles: [dev, prod]
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        # Vite bakes these into the browser bundle at build time.
        # Both dev and prod point at the hosted Supabase project.
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_AGENT_API_URL: ${VITE_AGENT_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"          # direct access kept for dev debugging
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── nginx — ingress, routing, SSE pass-through ──────────────────────────────
  nginx:
    profiles: [dev, prod]
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  uploads-data:   # Call recording files (dev); use Supabase Storage in prod
