# ── ADIP Docker Compose ───────────────────────────────────────────────────────
#
# Profiles:
#   dev   — full stack with DuckDB shim (no Docker secrets needed, in-memory DB)
#   prod  — web + api + nginx against real Supabase (set env vars in .env.prod)
#
# Usage:
#   dev:   docker compose --profile dev up --build
#   prod:  docker compose --profile prod up --build
#
# NOTE: `npm run dev` on the host still works exactly as before — Docker is the
# deployment target, not a required dev environment.
# ─────────────────────────────────────────────────────────────────────────────

name: adip

services:

  # ── DuckDB shim (dev profile only) ─────────────────────────────────────────
  # Express + embedded DuckDB that emulates Supabase PostgREST + Auth + SSE hub.
  # NOT used in production — production uses real Supabase.
  duckdb:
    profiles: [dev]
    build:
      context: .
      dockerfile: docker/shim.Dockerfile
    ports:
      - "54321:54321"
    volumes:
      - duckdb-data:/data      # persist DuckDB across container restarts in dev
    environment:
      PORT: "54321"
      DUCKDB_PATH: /data/dev.db
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:54321/health',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ── FastAPI — all agents in-process ────────────────────────────────────────
  api:
    profiles: [dev, prod]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"          # direct access kept for dev debugging
    volumes:
      - uploads-data:/app/.uploads   # persist call recordings in dev
    env_file:
      - path: ./apps/api/.env        # dev: local .env file (gitignored)
        required: false
      - path: ./.env.prod            # prod: production secrets (gitignored)
        required: false
    environment:
      # Dev defaults — overridden by env_file in practice
      SUPABASE_URL: ${SUPABASE_URL:-http://duckdb:54321}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-local-dev-anon-key}
      EVENT_BUS_ENABLED: ${EVENT_BUS_ENABLED:-1}
      EVENT_MAX_RETRIES: ${EVENT_MAX_RETRIES:-3}
      EVENT_RETRY_BACKOFF_MS: ${EVENT_RETRY_BACKOFF_MS:-500}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      duckdb:
        condition: service_healthy
        required: false   # prod profile: duckdb not running, skip this check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  # ── TanStack Start web app ──────────────────────────────────────────────────
  web:
    profiles: [dev, prod]
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        # Vite bakes these into the browser bundle at build time.
        # Dev: point at the shim exposed through nginx.
        # Prod: point at real Supabase URL.
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:54321}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-local-dev-anon-key}
        VITE_AGENT_API_URL: ${VITE_AGENT_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"          # direct access kept for dev debugging
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── nginx — ingress, routing, SSE pass-through ──────────────────────────────
  nginx:
    profiles: [dev, prod]
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  duckdb-data:    # DuckDB persistent storage (dev only)
  uploads-data:   # Call recording files (dev); use Supabase Storage in prod
