# ── ADIP nginx — reverse proxy ────────────────────────────────────────────────
# Routes:
#   /api/*          → api:8000  (FastAPI)
#   /whatsapp/*     → api:8000  (Meta webhook)
#   /intake/*       → api:8000  (SSE intake stream)
#   /followup/*     → api:8000  (SSE follow-up stream)
#   /events/*       → api:8000  (Phase 7 event endpoints)
#   /               → web:3000  (TanStack Start SSR)
#
# IMPORTANT: SSE streams must NOT be buffered.
# The browser EventSource connects to VITE_SUPABASE_URL (the shim in dev,
# or a Supabase Realtime channel in prod). The shim is exposed at /rest/v1/*
# and /intake/stream routes.
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Shared upstream definitions
    upstream api {
        server api:8000;
    }

    upstream web {
        server web:3000;
    }

    # In dev, the shim is the SSE hub and Supabase emulator
    upstream shim {
        server duckdb:54321;
    }

    # ── gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" $status '
                    '$body_bytes_sent "$http_referer" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # ── FastAPI — agent + health + metrics endpoints ───────────────────
        location ~ ^/(api|whatsapp|intake|followup|rescore|score|validate|workflow|calls|events)(/|$) {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE — critical: disable buffering so events reach the browser immediately
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;  # keep SSE connections alive for up to 1 hour
            chunked_transfer_encoding on;
        }

        # ── DuckDB shim — Supabase emulator + SSE hub (dev profile) ──────
        # The browser EventSource connects to VITE_SUPABASE_URL which is
        # http://localhost:54321 in dev → routed here via /rest and /intake path.
        location ~ ^/(rest/v1|auth/v1|storage/v1)(/|$) {
            proxy_pass         http://shim;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # SSE pass-through for /intake/stream
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # ── TanStack Start — all other routes (SSR) ───────────────────────
        location / {
            proxy_pass         http://web;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
